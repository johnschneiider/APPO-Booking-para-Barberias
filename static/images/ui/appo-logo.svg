<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rectangle with rounded corners -->
  <rect x="2" y="2" width="196" height="56" rx="8" fill="#F3F4F6" stroke="url(#logoGradient)" stroke-width="2"/>
  
  <!-- APPO text -->
  <text x="100" y="38" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="24" font-weight="700" text-anchor="middle" fill="url(#logoGradient)">
    APPO
  </text>
  
  <!-- Subtle accent line -->
  <line x1="40" y1="45" x2="160" y2="45" stroke="#10B981" stroke-width="1" opacity="0.6"/>
</svg> 