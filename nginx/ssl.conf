# Configuración inicial (solo HTTP) - SSL se configurará después de obtener certificados
server {
    listen 80;
    server_name appo.com.co www.appo.com.co localhost 127.0.0.1 _;

    # Ruta especial para el desafío de Let's Encrypt
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Archivos estáticos
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy hacia la aplicación Django
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Aumentar tamaño máximo del cuerpo
    client_max_body_size 20M;

    error_page 404 /404.html;
        location = /40x.html {}

    error_page 500 502 503 504 /50x.html;
        location = /50x.html {}
}
