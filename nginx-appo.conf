# Configuración de Nginx para appo.com.co
# Este archivo debe copiarse a /etc/nginx/sites-available/appo.com.co
# y luego crear un enlace simbólico en /etc/nginx/sites-enabled/

# Redirección HTTP a HTTPS
server {
    listen 80;
    server_name appo.com.co www.appo.com.co;

    # Permitir desafío de Let's Encrypt
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todo lo demás a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Configuración HTTPS
server {
    listen 443 ssl http2;
    server_name appo.com.co www.appo.com.co;

    # Certificados SSL (se configurarán con certbot)
    ssl_certificate /etc/letsencrypt/live/appo.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appo.com.co/privkey.pem;

    # Configuración SSL moderna
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Tamaño máximo de archivos
    client_max_body_size 20M;

    # Archivos estáticos
    location /static/ {
        alias /var/www/appo.com.co/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Archivos de media
    location /media/ {
        alias /var/www/appo.com.co/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health/ {
        proxy_pass http://127.0.0.1:8016/health/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy hacia la aplicación Django (Gunicorn)
    location / {
        proxy_pass http://127.0.0.1:8016;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket support (si usas Django Channels)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Páginas de error
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

