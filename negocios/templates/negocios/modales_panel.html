<!-- Modales para Panel del Negocio -->

<!-- Modal para editar logo -->
<div class="modal fade" id="editarLogoModal" tabindex="-1" aria-labelledby="editarLogoModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editarLogoModalLabel">Editar Logo</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form>
                    <div class="mb-3">
                        <label for="logo" class="form-label">Selecciona un nuevo logo:</label>
                        <input type="file" class="form-control" id="logo" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Aquí puedes agregar más modales según sea necesario. -->
